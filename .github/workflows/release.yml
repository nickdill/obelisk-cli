name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-amd64:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build \
            -tags netgo \
            -ldflags "-s -w -X github.com/nickdill/obelisk/cmd.version=${{ github.ref_name }}" \
            -o obelisk-linux-amd64 \
            .
      - uses: actions/upload-artifact@v4
        with:
          name: obelisk-linux-amd64
          path: obelisk-linux-amd64

  build-linux-arm64:
    name: Build Linux arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install musl
        run: sudo apt-get install -y musl-tools
      - name: Build
        env:
          CGO_ENABLED: "1"
          CC: musl-gcc
        run: |
          go build \
            -ldflags "-s -w -linkmode external -extldflags '-static' -X github.com/nickdill/obelisk/cmd.version=${{ github.ref_name }}" \
            -o obelisk-linux-arm64 \
            .
      - uses: actions/upload-artifact@v4
        with:
          name: obelisk-linux-arm64
          path: obelisk-linux-arm64

  build-darwin:
    name: Build macOS binaries
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-s -w -X github.com/nickdill/obelisk/cmd.version=${{ github.ref_name }}" \
            -o obelisk-darwin-${{ matrix.goarch }} \
            .
      - uses: actions/upload-artifact@v4
        with:
          name: obelisk-darwin-${{ matrix.goarch }}
          path: obelisk-darwin-${{ matrix.goarch }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build-linux-amd64, build-linux-arm64, build-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/obelisk-*
          generate_release_notes: true
