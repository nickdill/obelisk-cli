name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -tags netgo \
            -ldflags "-s -w -X github.com/nickdill/obelisk/cmd.version=${{ github.ref_name }}" \
            -o obelisk-linux-${{ matrix.goarch }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obelisk-linux-${{ matrix.goarch }}
          path: obelisk-linux-${{ matrix.goarch }}

  build-darwin:
    name: Build macOS binaries
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-s -w -X github.com/nickdill/obelisk/cmd.version=${{ github.ref_name }}" \
            -o obelisk-darwin-${{ matrix.goarch }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obelisk-darwin-${{ matrix.goarch }}
          path: obelisk-darwin-${{ matrix.goarch }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/obelisk-*
          generate_release_notes: true
