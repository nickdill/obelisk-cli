name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-s -w -X github.com/nickdill/obelisk/cmd.version=${{ github.ref_name }}" \
            -o obelisk-${{ matrix.goos }}-${{ matrix.goarch }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obelisk-${{ matrix.goos }}-${{ matrix.goarch }}
          path: obelisk-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/obelisk-*
          generate_release_notes: true
